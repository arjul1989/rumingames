name: Deploy to Cloud Run

# Deploys both services to Cloud Run. Provide these GitHub secrets:
#   GCP_PROJECT_ID            - GCP project id
#   GCP_REGION                - e.g. us-central1
#   GCP_WORKLOAD_IDP          - Workload Identity Federation provider
#   GCP_DEPLOY_SA             - deploy service account email
#   MEDUSA_PUBLISHABLE_KEY    - storefront build arg
#   MEDUSA_BACKEND_URL        - storefront build arg (public Medusa URL)
#   STOREFRONT_BASE_URL       - storefront public base URL
on:
  workflow_dispatch:
    inputs:
      service:
        description: Which service to deploy
        type: choice
        options: [both, medusa, storefront]
        default: both

env:
  AR_REPO: gorumin
  MEDUSA_SERVICE: gorumin-medusa
  STOREFRONT_SERVICE: gorumin-storefront

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push Medusa
        if: ${{ github.event.inputs.service == 'both' || github.event.inputs.service == 'medusa' }}
        run: |
          IMG="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${AR_REPO}/${MEDUSA_SERVICE}:${{ github.sha }}"
          docker build -f apps/medusa/Dockerfile -t "$IMG" .
          docker push "$IMG"
          gcloud run deploy "$MEDUSA_SERVICE" \
            --image "$IMG" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --port 9000 \
            --min-instances 0 \
            --allow-unauthenticated

      - name: Build & push Storefront
        if: ${{ github.event.inputs.service == 'both' || github.event.inputs.service == 'storefront' }}
        run: |
          IMG="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${AR_REPO}/${STOREFRONT_SERVICE}:${{ github.sha }}"
          docker build -f apps/storefront/Dockerfile \
            --build-arg NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY="${{ secrets.MEDUSA_PUBLISHABLE_KEY }}" \
            --build-arg NEXT_PUBLIC_MEDUSA_BACKEND_URL="${{ secrets.MEDUSA_BACKEND_URL }}" \
            --build-arg NEXT_PUBLIC_BASE_URL="${{ secrets.STOREFRONT_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_DEFAULT_REGION="co" \
            -t "$IMG" .
          docker push "$IMG"
          gcloud run deploy "$STOREFRONT_SERVICE" \
            --image "$IMG" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --port 8000 \
            --min-instances 0 \
            --allow-unauthenticated
