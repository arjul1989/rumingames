name: Deploy to Cloud Run (Production)

# Deploys to gorumin.com. Uses GitHub Environment "production" (WIF configured).
on:
  workflow_dispatch:
    inputs:
      service:
        description: Which service to deploy
        type: choice
        options: [both, medusa, storefront]
        default: both

env:
  AR_REPO: gorumin
  MEDUSA_SERVICE: gorumin-medusa
  STOREFRONT_SERVICE: gorumin-storefront

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Setup Node
        if: ${{ github.event.inputs.service == 'both' || github.event.inputs.service == 'medusa' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: ${{ github.event.inputs.service == 'both' || github.event.inputs.service == 'medusa' }}
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Run Medusa DB migrations
        if: ${{ github.event.inputs.service == 'both' || github.event.inputs.service == 'medusa' }}
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          SQL_INSTANCE: ${{ secrets.SQL_INSTANCE }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # Runs pending Medusa migrations against production before the new
          # image is deployed, matching what infra/gcp/deploy-prod.sh already
          # does locally via a Cloud Run Job. Uses the same cloud-sql-proxy
          # pattern as the sandbox sync-content job.
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          CONN="${GCP_PROJECT_ID}:${GCP_REGION}:${SQL_INSTANCE}"
          ./cloud-sql-proxy "$CONN" --port 5432 &
          PROXY_PID=$!
          trap "kill $PROXY_PID 2>/dev/null || true" EXIT
          for _ in $(seq 1 30); do
            (echo >/dev/tcp/127.0.0.1/5432) &>/dev/null && break
            sleep 0.5
          done
          export NODE_ENV=production
          export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@127.0.0.1:5432/${DB_NAME}"
          cd apps/medusa
          npx medusa db:migrate

      - name: Build & push Medusa
        if: ${{ github.event.inputs.service == 'both' || github.event.inputs.service == 'medusa' }}
        env:
          SQL_CONN: ${{ secrets.GCP_PROJECT_ID }}:${{ secrets.GCP_REGION }}:${{ secrets.SQL_INSTANCE }}
        run: |
          IMG="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${AR_REPO}/${MEDUSA_SERVICE}:${{ github.sha }}"
          docker build -f apps/medusa/Dockerfile -t "$IMG" .
          docker push "$IMG"
          # --set-env-vars uses commas as the list separator, which breaks on values
          # that themselves contain commas (e.g. AUTH_CORS with multiple origins).
          # An env-vars-file (YAML) avoids that ambiguity entirely.
          cat > /tmp/medusa-env.yaml <<EOF
          NODE_ENV: production
          DATABASE_URL: "postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@/${{ secrets.DB_NAME }}?host=/cloudsql/$SQL_CONN"
          JWT_SECRET: "${{ secrets.JWT_SECRET }}"
          COOKIE_SECRET: "${{ secrets.COOKIE_SECRET }}"
          DIGITAL_CODE_ENCRYPTION_KEY: "${{ secrets.DIGITAL_CODE_ENCRYPTION_KEY }}"
          STORE_CORS: "${{ secrets.STORE_CORS }}"
          ADMIN_CORS: "${{ secrets.ADMIN_CORS }}"
          AUTH_CORS: "${{ secrets.AUTH_CORS }}"
          MEDUSA_BACKEND_URL: "${{ secrets.MEDUSA_BACKEND_URL }}"
          STOREFRONT_URL: "${{ secrets.STOREFRONT_BASE_URL }}"
          MP_ACCESS_TOKEN: "${{ secrets.MP_ACCESS_TOKEN }}"
          MP_PUBLIC_KEY: "${{ secrets.MP_PUBLIC_KEY }}"
          MP_WEBHOOK_SECRET: "${{ secrets.MP_WEBHOOK_SECRET }}"
          MP_NOTIFICATION_URL: "${{ secrets.MEDUSA_BACKEND_URL }}/hooks/mercadopago"
          FAZER_API_KEY: "${{ secrets.FAZER_API_KEY }}"
          REDIS_URL: "${{ secrets.REDIS_URL }}"
          BREVO_API_KEY: "${{ secrets.BREVO_API_KEY }}"
          BREVO_FROM_EMAIL: "${{ secrets.BREVO_FROM_EMAIL }}"
          BREVO_SENDER_NAME: "${{ secrets.BREVO_SENDER_NAME }}"
          BREVO_REPLY_TO: "${{ secrets.BREVO_REPLY_TO }}"
          ADMIN_ALERT_EMAIL: "${{ secrets.ADMIN_ALERT_EMAIL }}"
          REVALIDATE_SECRET: "${{ secrets.REVALIDATE_SECRET }}"
          EOF
          gcloud run deploy "$MEDUSA_SERVICE" \
            --image "$IMG" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --port 9000 \
            --min-instances 0 \
            --max-instances 5 \
            --memory 1Gi \
            --timeout 300 \
            --add-cloudsql-instances "$SQL_CONN" \
            --env-vars-file /tmp/medusa-env.yaml \
            --allow-unauthenticated

      - name: Build & push Storefront
        if: ${{ github.event.inputs.service == 'both' || github.event.inputs.service == 'storefront' }}
        run: |
          IMG="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${AR_REPO}/${STOREFRONT_SERVICE}:${{ github.sha }}"
          docker build -f apps/storefront/Dockerfile \
            --build-arg NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY="${{ secrets.MEDUSA_PUBLISHABLE_KEY }}" \
            --build-arg NEXT_PUBLIC_MEDUSA_BACKEND_URL="${{ secrets.MEDUSA_BACKEND_URL }}" \
            --build-arg NEXT_PUBLIC_BASE_URL="${{ secrets.STOREFRONT_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_DEFAULT_REGION="co" \
            -t "$IMG" .
          docker push "$IMG"
          gcloud run deploy "$STOREFRONT_SERVICE" \
            --image "$IMG" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --port 8000 \
            --min-instances 0 \
            --allow-unauthenticated
