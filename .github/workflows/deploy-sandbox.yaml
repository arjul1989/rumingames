name: Deploy Sandbox

# Deploys to sbx.gorumin.com (Cloud Run *-sbx services).
# Configure GitHub Environment "sandbox" with the same secret names as production
# but sandbox values (see docs/infra/environments.md).
on:
  workflow_dispatch:
    inputs:
      service:
        description: Which service to deploy
        type: choice
        options: [both, medusa, storefront]
        default: both
  push:
    branches: [develop]

env:
  AR_REPO: gorumin
  MEDUSA_SERVICE: gorumin-medusa-sbx
  STOREFRONT_SERVICE: gorumin-storefront-sbx

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: sandbox
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push Medusa (sandbox)
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.service == 'both' ||
          github.event.inputs.service == 'medusa'
        env:
          SQL_CONN: ${{ secrets.GCP_PROJECT_ID }}:${{ secrets.GCP_REGION }}:${{ secrets.SQL_INSTANCE }}
        run: |
          IMG="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.MEDUSA_SERVICE }}:${{ github.sha }}"
          docker build -f apps/medusa/Dockerfile -t "$IMG" .
          docker push "$IMG"
          # --set-env-vars uses commas as the list separator, which breaks on values
          # that themselves contain commas (e.g. AUTH_CORS with multiple origins).
          # An env-vars-file (YAML) avoids that ambiguity entirely.
          cat > /tmp/medusa-env.yaml <<EOF
          NODE_ENV: production
          DATABASE_URL: "postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@/${{ secrets.DB_NAME }}?host=/cloudsql/$SQL_CONN"
          JWT_SECRET: "${{ secrets.JWT_SECRET }}"
          COOKIE_SECRET: "${{ secrets.COOKIE_SECRET }}"
          DIGITAL_CODE_ENCRYPTION_KEY: "${{ secrets.DIGITAL_CODE_ENCRYPTION_KEY }}"
          STORE_CORS: "${{ secrets.STORE_CORS }}"
          ADMIN_CORS: "${{ secrets.ADMIN_CORS }}"
          AUTH_CORS: "${{ secrets.AUTH_CORS }}"
          MEDUSA_BACKEND_URL: "${{ secrets.MEDUSA_BACKEND_URL }}"
          STOREFRONT_URL: "${{ secrets.STOREFRONT_BASE_URL }}"
          REVALIDATE_SECRET: "${{ secrets.REVALIDATE_SECRET }}"
          EOF
          gcloud run deploy "${{ env.MEDUSA_SERVICE }}" \
            --image "$IMG" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --port 9000 \
            --min-instances 0 \
            --max-instances 3 \
            --memory 1Gi \
            --timeout 300 \
            --add-cloudsql-instances "$SQL_CONN" \
            --env-vars-file /tmp/medusa-env.yaml \
            --allow-unauthenticated

      - name: Build & push Storefront (sandbox)
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.service == 'both' ||
          github.event.inputs.service == 'storefront'
        run: |
          IMG="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.STOREFRONT_SERVICE }}:${{ github.sha }}"
          docker build -f apps/storefront/Dockerfile \
            --build-arg NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY="${{ secrets.MEDUSA_PUBLISHABLE_KEY }}" \
            --build-arg NEXT_PUBLIC_MEDUSA_BACKEND_URL="${{ secrets.MEDUSA_BACKEND_URL }}" \
            --build-arg NEXT_PUBLIC_BASE_URL="${{ secrets.STOREFRONT_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_DEFAULT_REGION="co" \
            -t "$IMG" .
          docker push "$IMG"
          gcloud run deploy "${{ env.STOREFRONT_SERVICE }}" \
            --image "$IMG" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --port 8000 \
            --min-instances 0 \
            --update-env-vars "REVALIDATE_SECRET=${{ secrets.REVALIDATE_SECRET }}" \
            --allow-unauthenticated

  sync-content:
    needs: deploy
    if: github.event_name == 'push' || github.event.inputs.service == 'both' || github.event.inputs.service == 'medusa'
    runs-on: ubuntu-latest
    environment: sandbox
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Sync CMS + images to sandbox DB
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          SQL_INSTANCE: ${{ secrets.SQL_INSTANCE }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          STOREFRONT_BASE_URL: ${{ secrets.STOREFRONT_BASE_URL }}
          MEDUSA_BACKEND_URL: ${{ secrets.MEDUSA_BACKEND_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          FAZER_API_KEY: ${{ secrets.FAZER_API_KEY }}
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          CONN="${GCP_PROJECT_ID}:${GCP_REGION}:${SQL_INSTANCE}"
          ./cloud-sql-proxy "$CONN" --port 5433 &
          PROXY_PID=$!
          trap "kill $PROXY_PID 2>/dev/null || true" EXIT
          for _ in $(seq 1 30); do
            (echo >/dev/tcp/127.0.0.1/5433) &>/dev/null && break
            sleep 0.5
          done
          export NODE_ENV=production
          export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@127.0.0.1:5433/${DB_NAME}"
          export STOREFRONT_URL="${STOREFRONT_BASE_URL}"
          export SYNC_MODE=fast
          cd apps/medusa
          npx medusa exec ./src/scripts/sync-storefront-content.ts
