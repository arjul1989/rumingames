name: Deploy Sandbox

# Deploys to sbx.gorumin.com (Cloud Run *-sbx services).
# Configure GitHub Environment "sandbox" with the same secret names as production
# but sandbox values (see docs/infra/environments.md).
on:
  workflow_dispatch:
    inputs:
      service:
        description: Which service to deploy
        type: choice
        options: [both, medusa, storefront]
        default: both
  push:
    branches: [develop]

env:
  AR_REPO: gorumin
  MEDUSA_SERVICE: gorumin-medusa-sbx
  STOREFRONT_SERVICE: gorumin-storefront-sbx

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: sandbox
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push Medusa (sandbox)
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.service == 'both' ||
          github.event.inputs.service == 'medusa'
        env:
          SQL_CONN: ${{ secrets.GCP_PROJECT_ID }}:${{ secrets.GCP_REGION }}:${{ secrets.SQL_INSTANCE }}
        run: |
          IMG="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.MEDUSA_SERVICE }}:${{ github.sha }}"
          docker build -f apps/medusa/Dockerfile -t "$IMG" .
          docker push "$IMG"
          gcloud run deploy "${{ env.MEDUSA_SERVICE }}" \
            --image "$IMG" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --port 9000 \
            --min-instances 0 \
            --max-instances 3 \
            --memory 1Gi \
            --timeout 300 \
            --add-cloudsql-instances "$SQL_CONN" \
            --set-env-vars "\
          NODE_ENV=production,\
          DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@/${{ secrets.DB_NAME }}?host=/cloudsql/$SQL_CONN,\
          JWT_SECRET=${{ secrets.JWT_SECRET }},\
          COOKIE_SECRET=${{ secrets.COOKIE_SECRET }},\
          DIGITAL_CODE_ENCRYPTION_KEY=${{ secrets.DIGITAL_CODE_ENCRYPTION_KEY }},\
          STORE_CORS=${{ secrets.STORE_CORS }},\
          ADMIN_CORS=${{ secrets.ADMIN_CORS }},\
          AUTH_CORS=${{ secrets.AUTH_CORS }},\
          MEDUSA_BACKEND_URL=${{ secrets.MEDUSA_BACKEND_URL }},\
          STOREFRONT_URL=${{ secrets.STOREFRONT_BASE_URL }},\
          REVALIDATE_SECRET=${{ secrets.REVALIDATE_SECRET }}" \
            --allow-unauthenticated

      - name: Build & push Storefront (sandbox)
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.service == 'both' ||
          github.event.inputs.service == 'storefront'
        run: |
          IMG="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.STOREFRONT_SERVICE }}:${{ github.sha }}"
          docker build -f apps/storefront/Dockerfile \
            --build-arg NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY="${{ secrets.MEDUSA_PUBLISHABLE_KEY }}" \
            --build-arg NEXT_PUBLIC_MEDUSA_BACKEND_URL="${{ secrets.MEDUSA_BACKEND_URL }}" \
            --build-arg NEXT_PUBLIC_BASE_URL="${{ secrets.STOREFRONT_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_DEFAULT_REGION="co" \
            -t "$IMG" .
          docker push "$IMG"
          gcloud run deploy "${{ env.STOREFRONT_SERVICE }}" \
            --image "$IMG" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --port 8000 \
            --min-instances 0 \
            --allow-unauthenticated
