<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 400" role="img" aria-label="Free Fire Diamantes">
  <defs>
    
      <linearGradient id="bg-free-fire" x1="0" y1="0" x2="400" y2="400">
        <stop stop-color="#140600"/>
        <stop offset="0.3" stop-color="#993300"/>
        <stop offset="0.65" stop-color="#ff6600"/>
        <stop offset="1" stop-color="#ffaa00"/>
      </linearGradient>
      <radialGradient id="shine-free-fire" cx="15%" cy="25%" r="55%">
        <stop stop-color="#4cd7f6" stop-opacity="0.1"/>
        <stop offset="1" stop-color="#4cd7f6" stop-opacity="0"/>
      </radialGradient>
    <linearGradient id="frame-free-fire" x1="0" y1="0" x2="400" y2="400">
      <stop stop-color="#ddb7ff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#4d4354" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#4cd7f6" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="glow-free-fire" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip-free-fire"><rect width="400" height="400" rx="28"/></clipPath>
  </defs>

  <!-- Gorumin dark base -->
  <rect width="400" height="400" rx="28" fill="#0b1326"/>

  <g clip-path="url(#clip-free-fire)">
    <rect width="400" height="400" fill="url(#bg-free-fire)"/>
    <rect width="400" height="400" fill="url(#shine-free-fire)"/>
    <ellipse cx="200" cy="390" rx="170" ry="50" fill="#b76dff" fill-opacity="0.1"/>
    <image xlink:href="data:image/svg+xml;base64," x="60" y="186" width="280" height="40" preserveAspectRatio="xMidYMid meet"/>
    
  </g>

  <!-- Hyper-glass rim -->
  <rect x="1.5" y="1.5" width="397" height="397" rx="26.5" fill="none" stroke="url(#frame-free-fire)" stroke-width="2"/>
  <rect x="10" y="10" width="380" height="380" rx="22" fill="none" stroke="#ddb7ff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Gorumin cyan accent (matches app icon) -->
  <circle cx="348" cy="52" r="16" fill="#4cd7f6" fill-opacity="0.18"/>
  <circle cx="348" cy="52" r="7" fill="#4cd7f6" filter="url(#glow-free-fire)"/>
</svg>